# =========================================================
# CONFIGURATION DÉPLOIEMENT MULTI-POC (TRAEFIK READY)
# Projet : Apartment Hunter
# =========================================================

services:

  # Bloc pour le Back-end (API FastAPI)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apartment-api
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
      - /app/.venv
      - ./models:/app/models:ro
      - ./data_model:/app/data_model:ro
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.apartment-api.rule=Host(`lab.zanza-creation.com`) && PathPrefix(`/apartment-hunter/api`)"
      - "traefik.http.routers.apartment-api.priority=2500" # Priorité haute
      - "traefik.http.routers.apartment-api.entrypoints=websecure"
      - "traefik.http.routers.apartment-api.tls.certresolver=myresolver"
      # 2. Gestion du Slash final (Redirect)
      - "traefik.http.middlewares.apartment-slash.redirectregex.regex=^.*\\/apartment-hunter/api$"
      - "traefik.http.middlewares.apartment-slash.redirectregex.replacement=https://lab.zanza-creation.com/apartment-hunter/api/"
      # 3. StripPrefix (Rabotage du chemin pour FastAPI)
      - "traefik.http.middlewares.apartment-strip.stripprefix.prefixes=/apartment-hunter/api"
      # 4. Application des middlewares (L'ordre compte : d'abord le slash, puis le strip)
      - "traefik.http.routers.apartment-api.middlewares=apartment-slash,apartment-strip"
      # 5. Port du service
      - "traefik.http.services.apartment-api.loadbalancer.server.port=8000"
 

  # Bloc pour le Front-end (Interface Streamlit)
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: apartment-streamlit
    expose:
      - "8501"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - api
    volumes:
      - .:/app
      - /app/.venv
      - ./streamlit_app:/app/streamlit_app
    networks:
      - web
    # Note : Ajout du baseUrlPath pour le routage Traefik
    command: uv run streamlit run streamlit_app/app.py --server.port=8501 --server.address=0.0.0.0 --server.baseUrlPath=/apartment
    # deploy:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.apartment-ui.rule=Host(`lab.zanza-creation.com`) && PathPrefix(`/apartment`)"
      - "traefik.http.routers.apartment-front.priority=1500" # Entre le Hub et Sparkle
      - "traefik.http.routers.apartment-ui.entrypoints=websecure"
      - "traefik.http.routers.apartment-ui.tls.certresolver=myresolver"
      - "traefik.http.services.apartment-ui.loadbalancer.server.port=8501"

networks:
  web:
    external: true